name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 168.144.108.9 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@168.144.108.9 << 'ENDSSH'
            set -e
            cd /app
            for i in 1 2 3; do git pull origin main && break || sleep 10; done
            cd /app/backend && npm run build
            cd /app/frontend && npm run build && cp -r dist /var/www/siyuwanban
            pm2 restart siyuwanban
            echo "Deploy complete"
          ENDSSH
